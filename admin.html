!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — DutssRunning</title>
<link rel="stylesheet" href="style.css" />
<style>
  .admin-wrap{max-width:900px;margin:0 auto;padding:40px 20px 80px;}
  .login-box{
      max-width:360px;margin:80px auto;background:#fff;padding:30px;border-radius:16px;box-shadow:var(--shadow);
  }
  .login-box h2{text-align:center;margin-bottom:6px;}
  .login-box p{text-align:center;color:var(--steel);font-size:13px;margin-bottom:20px;}
  .login-box input{width:100%;padding:12px;border:2px solid #E2E2DC;border-radius:8px;margin-bottom:10px;}
  .login-box input:focus{outline:none;border-color:var(--hi-vis);}
  .login-box button{width:100%;padding:12px;background:var(--navy);color:var(--hi-vis);border-radius:8px;font-weight:700;}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:30px;}
  .stat-card{background:var(--navy);color:var(--offwhite);padding:18px;border-radius:12px;}
  .stat-card .num{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--hi-vis);}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:30px;}
  th,td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid #EEE;}
  th{background:var(--navy);color:var(--hi-vis);}
  .del-btn{color:var(--coral);font-weight:700;cursor:pointer;font-size:12px;}
  .ganti-foto-btn{color:var(--steel);font-weight:700;cursor:pointer;font-size:12px;}
  .thumb-mini{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
  .thumb-mini img{width:100%;height:100%;object-fit:cover;}
  .add-form{display:grid;grid-template-columns:1.3fr 1fr 1fr 1.2fr auto;gap:10px;background:#fff;padding:16px;border-radius:12px;box-shadow:var(--shadow);margin-bottom:6px;align-items:center;}
  .add-form input,.add-form select{padding:10px;border:2px solid #E2E2DC;border-radius:8px;}
  .add-form button{background:var(--hi-vis);color:var(--navy);border-radius:8px;font-weight:700;padding:0 16px;}
  .logout-btn{color:var(--coral);font-weight:700;font-size:13px;cursor:pointer;}
  #err{color:var(--coral);font-size:12px;text-align:center;display:none;margin-bottom:10px;}
  @media(max-width:700px){.add-form{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="logo">DUTSS<span style="color:#fff">RUNNING</span></div>
    <nav><a href="index.html">← Kembali ke Toko</a></nav>
  </div>
</header>
<div class="lane-divider"></div>

<div class="login-box" id="login-box">
  <h2>Admin Login</h2>
  <p>Halaman ini khusus untuk pengelola toko</p>
  <div id="err">Password salah. Coba lagi.</div>
  <input type="password" id="password" placeholder="Masukkan password">
  <button onclick="doLogin()">Masuk</button>
  <p style="margin-top:14px;font-size:11px;color:#B9B9B0">Demo password: <b>dutss2026</b> (ganti sebelum deploy asli)</p>
</div>
